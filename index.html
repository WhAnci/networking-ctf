<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔐 Networking CTF — Subnetting & Routing</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --text: #c9d1d9;
      --muted: #8b949e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: 2px;
    }
    header p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 0.95rem;
    }
    .badge {
      display: inline-block;
      background: #1f2937;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.78rem;
      color: var(--yellow);
      margin-top: 10px;
    }
    #quiz-container {
      width: 100%;
      max-width: 720px;
    }
    .question-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    .question-card:hover { border-color: var(--accent); }
    .q-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .q-num {
      background: var(--accent);
      color: #0d1117;
      border-radius: 50%;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .q-type {
      font-size: 0.72rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      color: var(--muted);
    }
    .q-text {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text);
    }
    .choices { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
    .choice-label {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .choice-label:hover { border-color: var(--accent); background: #1c2128; }
    .choice-label input[type=radio] { accent-color: var(--accent); width: 16px; height: 16px; }
    .choice-key {
      font-weight: 700;
      color: var(--accent);
      min-width: 20px;
    }
    .short-input {
      margin-top: 14px;
      width: 100%;
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .short-input:focus { border-color: var(--accent); }
    /* result states */
    .card-correct  { border-color: var(--green) !important; }
    .card-wrong    { border-color: var(--red)   !important; }
    .feedback { margin-top: 12px; font-size: 0.88rem; display: none; }
    .feedback.show { display: block; }
    .feedback.correct { color: var(--green); }
    .feedback.wrong   { color: var(--red); }
    .submit-btn {
      display: block;
      width: 100%;
      max-width: 720px;
      margin: 10px auto 0;
      padding: 14px;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #result-box {
      display: none;
      width: 100%;
      max-width: 720px;
      margin-top: 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      text-align: center;
    }
    #result-box h2 { font-size: 1.6rem; margin-bottom: 8px; }
    #score-display {
      font-size: 3rem;
      font-weight: 800;
      margin: 16px 0;
    }
    #result-msg { color: var(--muted); font-size: 1rem; }
    #already-done {
      display: none;
      width: 100%;
      max-width: 720px;
      background: var(--panel);
      border: 1px solid var(--yellow);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
    }
    #already-done h2 { color: var(--yellow); font-size: 1.4rem; }
    #already-done p  { color: var(--muted); margin-top: 10px; }
    #already-done .prev-score { font-size: 2.5rem; font-weight: 800; margin: 16px 0; }
    .flag {
      font-family: monospace;
      background: #0d1117;
      border: 1px solid var(--border);
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 1rem;
      color: var(--green);
      margin-top: 12px;
      display: inline-block;
    }
    footer { color: var(--muted); font-size: 0.78rem; margin-top: 48px; }
  </style>
</head>
<body>

<header>
  <h1>🔐 Networking CTF</h1>
  <p>서브네팅 &amp; 라우팅 개념 문제풀이</p>
  <span class="badge">총 10문제 · 1회 응시 제한</span>
</header>

<div id="already-done">
  <h2>⚠️ 이미 응시 완료</h2>
  <div class="prev-score" id="prev-score-display"></div>
  <p>이 CTF는 1회만 응시할 수 있습니다.<br/>결과는 로컬에 저장되어 새로고침해도 유지됩니다.</p>
</div>

<div id="quiz-container"></div>
<button class="submit-btn" id="submit-btn" style="display:none">🚩 제출하기</button>
<div id="result-box">
  <h2>🏁 최종 결과</h2>
  <div id="score-display"></div>
  <div id="result-msg"></div>
  <div class="flag" id="flag-display" style="display:none"></div>
</div>
<footer>© 2026 WhAnci · Networking CTF</footer>

<script>
const STORAGE_KEY = 'networking_ctf_done';

const questions = [
  {
    id: 1,
    type: 'mc',
    text: 'IP 192.168.1.0/24를 8개의 서브넷으로 나눌 때 올바른 서브넷 마스크는?',
    choices: ['/25', '/26', '/27', '/28'],
    answer: 'C'
  },
  {
    id: 2,
    type: 'short',
    text: '/27 서브넷에서 사용 가능한 호스트 수는? (숫자만 입력)',
    answer: '30'
  },
  {
    id: 3,
    type: 'mc',
    text: '다음 IP의 네트워크 주소는?\nIP: 192.168.5.130/26',
    choices: ['192.168.5.0', '192.168.5.64', '192.168.5.128', '192.168.5.192'],
    answer: 'C'
  },
  {
    id: 4,
    type: 'short',
    text: '/30 서브넷에서 사용 가능한 호스트 수는? (숫자만 입력)',
    answer: '2'
  },
  {
    id: 5,
    type: 'mc',
    text: '다음 중 라우팅의 역할은?',
    choices: ['데이터 압축', '패킷 경로 선택', 'IP 주소 할당', '에러 수정'],
    answer: 'B'
  },
  {
    id: 6,
    type: 'mc',
    text: '정적 라우팅의 특징으로 옳은 것은?',
    choices: ['자동으로 경로가 변경된다', '관리자 수동 설정 필요', '항상 최적 경로를 찾는다', '라우팅 프로토콜 필요'],
    answer: 'B'
  },
  {
    id: 7,
    type: 'mc',
    text: '다음 중 다이나믹 라우팅 프로토콜은?',
    choices: ['ARP', 'FTP', 'OSPF', 'DNS'],
    answer: 'C'
  },
  {
    id: 8,
    type: 'short',
    text: '라우팅 테이블에서 패킷이 다음으로 이동할 장비를 무엇이라 하는가? (영어로 입력)',
    answer: 'next hop'
  },
  {
    id: 9,
    type: 'mc',
    text: '서브네팅의 주요 목적은?',
    choices: ['인터넷 속도 증가', '네트워크 분할 및 관리 효율 증가', 'CPU 성능 향상', '전력 절약'],
    answer: 'B'
  },
  {
    id: 10,
    type: 'short',
    text: '192.168.1.0/26에서 하나의 서브넷 크기(블록 크기)는? (숫자만 입력)',
    answer: '64'
  }
];

const keys = ['A','B','C','D'];

function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    const data = JSON.parse(saved);
    document.getElementById('already-done').style.display = 'block';
    document.getElementById('prev-score-display').textContent =
      data.score + ' / ' + data.total + '점';
    return;
  }

  const container = document.getElementById('quiz-container');
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + q.id;

    const header = `
      <div class="q-header">
        <div class="q-num">${q.id}</div>
        <span class="q-type">${q.type === 'mc' ? '객관식' : '단답형'}</span>
      </div>
      <div class="q-text">${q.text.replace(/\n/g, '<br/>')}</div>
    `;

    let input = '';
    if (q.type === 'mc') {
      input = '<div class="choices">' +
        q.choices.map((c, ci) => `
          <label class="choice-label">
            <input type="radio" name="q${q.id}" value="${keys[ci]}" />
            <span class="choice-key">${keys[ci]}.</span>
            <span>${c}</span>
          </label>
        `).join('') +
        '</div>';
    } else {
      input = `<input class="short-input" id="short-${q.id}" type="text" placeholder="답 입력..." autocomplete="off" />`;
    }

    card.innerHTML = header + input +
      `<div class="feedback" id="fb-${q.id}"></div>`;
    container.appendChild(card);
  });

  document.getElementById('submit-btn').style.display = 'block';
  document.getElementById('submit-btn').addEventListener('click', submitQuiz);
}

function submitQuiz() {
  let score = 0;
  let allAnswered = true;

  questions.forEach(q => {
    let userAns = '';
    if (q.type === 'mc') {
      const sel = document.querySelector(`input[name="q${q.id}"]:checked`);
      if (!sel) { allAnswered = false; return; }
      userAns = sel.value;
    } else {
      const inp = document.getElementById('short-' + q.id);
      userAns = inp.value.trim().toLowerCase();
      if (!userAns) { allAnswered = false; return; }
    }

    const correct = q.answer.toLowerCase();
    const card = document.getElementById('card-' + q.id);
    const fb   = document.getElementById('fb-' + q.id);

    if (userAns === correct) {
      score++;
      card.classList.add('card-correct');
      fb.textContent = '✅ 정답!';
      fb.className = 'feedback show correct';
    } else {
      card.classList.add('card-wrong');
      fb.textContent = `❌ 오답 — 정답: ${q.answer}`;
      fb.className = 'feedback show wrong';
    }

    // disable inputs
    if (q.type === 'mc') {
      document.querySelectorAll(`input[name="q${q.id}"]`).forEach(r => r.disabled = true);
    } else {
      document.getElementById('short-' + q.id).disabled = true;
    }
  });

  if (!allAnswered) {
    alert('모든 문제에 답해주세요!');
    return;
  }

  // save to localStorage
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ score, total: questions.length, date: Date.now() }));

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '✅ 제출 완료';

  const resultBox = document.getElementById('result-box');
  const scoreDisplay = document.getElementById('score-display');
  const resultMsg = document.getElementById('result-msg');
  const flagDisplay = document.getElementById('flag-display');

  resultBox.style.display = 'block';
  resultBox.scrollIntoView({ behavior: 'smooth' });

  const pct = score / questions.length;
  scoreDisplay.textContent = score + ' / ' + questions.length + '점';
  scoreDisplay.style.color = pct >= 0.8 ? 'var(--green)' : pct >= 0.5 ? 'var(--yellow)' : 'var(--red)';

  if (pct === 1) {
    resultMsg.textContent = '🎉 완벽합니다! 모두 정답!';
    flagDisplay.style.display = 'inline-block';
    flagDisplay.textContent = 'FLAG{subnet_master_routing_pro_2026}';
  } else if (pct >= 0.8) {
    resultMsg.textContent = '🔥 훌륭해요! 네트워크 실력이 뛰어나네요.';
  } else if (pct >= 0.5) {
    resultMsg.textContent = '📚 절반 이상 맞췄어요. 조금 더 공부해보세요!';
  } else {
    resultMsg.textContent = '💡 아직 갈 길이 있어요. 서브네팅 & 라우팅을 복습해보세요!';
  }
}

init();
</script>
</body>
</html>
